name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Triggers on main or master pushes

permissions:
  contents: write # Needed to deploy to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 18

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Application
        run: |
          # Automatically extract repo name for VITE_BASE_URL
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          export VITE_BASE_URL="/$REPO_NAME/"
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite outputs built assets to
          branch: gh-pages # The branch the action will deploy to
          clean: true
